<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Logo Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>ASCII Logo Generator</h1>
      <p>Create block-style ASCII art logos with gradient colours</p>
    </header>

    <main>
      <div class="preview-section">
        <div class="preview-container">
          <div class="logo" id="logo-preview">
            <div class="ascii" id="ascii-output"></div>
            <div class="rule" id="rule-output"></div>
            <div class="tagline" id="tagline-output"></div>
          </div>
        </div>
      </div>

      <div class="controls-section">

        <details class="section" open>
          <summary class="section-header">Content</summary>
          <div class="section-body">
            <div class="control-group">
              <label for="logo-text">Text</label>
              <input type="text" id="logo-text" maxlength="12" placeholder="ABC">
            </div>
            <div class="control-group">
              <label for="tagline-text">Title</label>
              <input type="text" id="tagline-text" maxlength="120" placeholder="your tagline here">
            </div>
          </div>
        </details>

        <details class="section">
          <summary class="section-header">Style</summary>
          <div class="section-body">
            <div class="control-group">
              <label for="font-select">Font</label>
              <select id="font-select">
                <option value="block">Block (bold shadows)</option>
                <option value="shade">Shade (░ fill)</option>
                <option value="huge">Huge (maximum impact)</option>
                <option value="slick">Slick (rounded)</option>
                <option value="chrome">Chrome (compact)</option>
                <option value="tiny">Tiny (half-blocks)</option>
                <option value="pixel">Pixel (lowercase)</option>
              </select>
            </div>
            <div class="control-group">
              <label>Colour Palette</label>
              <div class="palette-options" id="palette-options"></div>
            </div>
            <div class="control-group custom-colors" id="custom-colors-group" style="display:none">
              <div class="custom-color-row">
                <label>Colour 1 <input type="color" id="custom-color-1"></label>
                <label>Colour 2 <input type="color" id="custom-color-2"></label>
                <label>Colour 3 <input type="color" id="custom-color-3"></label>
              </div>
            </div>
            <div class="control-group">
              <label for="gradient-direction">Gradient Direction</label>
              <select id="gradient-direction">
                <option value="vertical">Vertical</option>
                <option value="horizontal">Horizontal</option>
                <option value="diagonal">Diagonal</option>
              </select>
            </div>
            <div class="control-group">
              <label for="italic-mode">Italic</label>
              <select id="italic-mode">
                <option value="none">None</option>
                <option value="skew">Skew (visual)</option>
                <option value="block">Block (text)</option>
              </select>
            </div>
            <div class="control-group" id="italic-amount-group" style="display:none">
              <label for="italic-slider"><span id="italic-label"></span>: <span id="italic-value"></span><span id="italic-unit"></span></label>
              <input type="range" id="italic-slider" min="-20" max="20" step="1">
            </div>
            <div class="control-group" id="block-style-group" style="display:none">
              <label for="block-style">Block Style</label>
              <select id="block-style">
                <option value="solid">Solid</option>
                <option value="shade">Shade</option>
                <option value="medium">Medium</option>
                <option value="light">Light</option>
                <option value="outline">Outline</option>
              </select>
            </div>
          </div>
        </details>

        <details class="section">
          <summary class="section-header">Layout</summary>
          <div class="section-body">
            <div class="control-group">
              <label for="logo-size">Logo Size: <span id="logo-size-value"></span>px</label>
              <input type="range" id="logo-size" min="6" max="48">
            </div>
            <div class="control-group">
              <label for="line-height">Line Height: <span id="line-height-value"></span></label>
              <input type="range" id="line-height" min="0.8" max="1.8" step="0.05">
            </div>
            <div class="control-group">
              <label>Alignment</label>
              <div class="align-options">
                <button type="button" class="align-option" data-align="left">Left</button>
                <button type="button" class="align-option" data-align="center">Centre</button>
                <button type="button" class="align-option" data-align="right">Right</button>
              </div>
            </div>
          </div>
        </details>

        <details class="section">
          <summary class="section-header">Title</summary>
          <div class="section-body">
            <div class="control-group">
              <label for="tagline-size">Size: <span id="tagline-size-value"></span>px</label>
              <input type="range" id="tagline-size" min="8" max="36">
            </div>
            <div class="control-group">
              <label for="tagline-font">Font</label>
              <select id="tagline-font">
                <option value="mono">JetBrains Mono</option>
                <option value="firacode">Fira Code</option>
                <option value="spacemono">Space Mono</option>
                <option value="ibmplex">IBM Plex Mono</option>
                <option value="majormono">Major Mono Display</option>
                <option value="atkinson">Atkinson Hyperlegible</option>
                <option value="sans">Space Grotesk</option>
                <option value="serif">Georgia</option>
              </select>
            </div>
            <div class="control-group">
              <label for="tagline-spacing">Spacing: <span id="tagline-spacing-value"></span>px</label>
              <input type="range" id="tagline-spacing" min="0" max="20">
            </div>
            <div class="control-group">
              <label for="tagline-case">Case</label>
              <select id="tagline-case">
                <option value="none">As typed</option>
                <option value="uppercase">UPPERCASE</option>
                <option value="lowercase">lowercase</option>
              </select>
            </div>
            <div class="control-group">
              <label>
                <input type="checkbox" id="tagline-single-line"> Single line
              </label>
            </div>
            <div class="control-group">
              <label>
                <input type="checkbox" id="show-tagline"> Show title
              </label>
            </div>
          </div>
        </details>

        <details class="section">
          <summary class="section-header">Display</summary>
          <div class="section-body">
            <div class="control-group">
              <label>Background</label>
              <div class="align-options bg-mode-options">
                <button type="button" class="align-option bg-mode-option" data-bg-mode="solid">Solid</button>
                <button type="button" class="align-option bg-mode-option" data-bg-mode="gradient">Gradient</button>
              </div>
            </div>
            <div class="control-group" id="bg-solid-group">
              <div class="bg-options">
                <button type="button" class="bg-option" data-bg="#000000">Black</button>
                <button type="button" class="bg-option" data-bg="#0d1117">Dark</button>
                <button type="button" class="bg-option" data-bg="#1a1a2e">Navy</button>
                <button type="button" class="bg-option" data-bg="#ffffff">White</button>
                <button type="button" class="bg-option bg-option-custom" data-bg="custom" aria-label="Custom background" title="Custom background"></button>
              </div>
            </div>
            <div class="control-group custom-bg-group" id="custom-bg-group" style="display:none">
              <div class="custom-color-row">
                <label>Custom background <input type="color" id="custom-bg-color"></label>
              </div>
            </div>
            <div class="control-group" id="bg-gradient-group" style="display:none">
              <div class="custom-color-row">
                <label>Colour 1 <input type="color" id="bg-gradient-color-1"></label>
                <label>Colour 2 <input type="color" id="bg-gradient-color-2"></label>
                <label>Colour 3 <input type="color" id="bg-gradient-color-3"></label>
              </div>
            </div>
            <div class="control-group" id="bg-gradient-direction-group" style="display:none">
              <label for="bg-gradient-direction">Gradient Direction</label>
              <select id="bg-gradient-direction">
                <option value="vertical">Vertical</option>
                <option value="horizontal">Horizontal</option>
                <option value="diagonal">Diagonal</option>
              </select>
            </div>
            <div class="control-group">
              <div class="rule-row">
                <label class="rule-check">
                  <input type="checkbox" id="show-rule"> Separator
                </label>
                <select id="rule-style" class="rule-select">
                  <option value="┄">┄┄┄</option>
                  <option value="─">───</option>
                  <option value="═">═══</option>
                  <option value="━">━━━</option>
                  <option value="-">---</option>
                  <option value="=">=== </option>
                  <option value="·">···</option>
                  <option value="•">•••</option>
                  <option value="~">~~~</option>
                  <option value="custom">Custom</option>
                </select>
                <input type="text" id="rule-custom-char" class="rule-custom-input" maxlength="3" placeholder="─" style="display:none">
              </div>
              <div class="control-group rule-length-group" id="rule-length-group">
                <label for="rule-length">Length: <span id="rule-length-value"></span>%</label>
                <input type="range" id="rule-length" min="25" max="200" step="5">
              </div>
            </div>
          </div>
        </details>

        <details class="section">
          <summary class="section-header">Export</summary>
          <div class="section-body">
            <div class="control-group">
              <label for="export-scale">Export Scale: <span id="export-scale-value"></span>%</label>
              <input type="range" id="export-scale" min="100" max="300" step="25">
            </div>
            <div class="control-group">
              <label for="export-padding">Export Padding: <span id="export-padding-value"></span>px</label>
              <input type="range" id="export-padding" min="0" max="200" step="4">
            </div>
            <div class="control-group">
              <label>Aspect Ratio</label>
              <div class="align-options export-ratio-options">
                <button type="button" class="align-option export-ratio-option" data-export-aspect-ratio="auto">Auto</button>
                <button type="button" class="align-option export-ratio-option" data-export-aspect-ratio="1:1">Square</button>
                <button type="button" class="align-option export-ratio-option" data-export-aspect-ratio="4:3">4:3</button>
                <button type="button" class="align-option export-ratio-option" data-export-aspect-ratio="3:2">3:2</button>
              </div>
            </div>
            <div class="control-group">
              <label>
                <input type="checkbox" id="transparent-bg"> Transparent background
              </label>
            </div>
            <div class="control-group">
              <label>
                <input type="checkbox" id="export-logo-only"> Export logo only (no title or separator)
              </label>
            </div>
            <input type="file" id="settings-import-input" accept="application/json,.json" hidden>
            <div class="export-buttons">
              <button type="button" id="export-settings" class="btn btn-secondary">Export JSON</button>
              <button type="button" id="import-settings" class="btn btn-secondary">Import JSON</button>
              <button type="button" id="export-html" class="btn btn-primary">Export HTML</button>
              <button type="button" id="export-png" class="btn btn-primary">Export PNG</button>
              <button type="button" id="copy-text" class="btn btn-secondary btn-full">Copy Text</button>
            </div>
          </div>
        </details>

      </div>
    </main>

    <footer>
      <p>Vanilla JS &bull; Fonts by <a href="https://github.com/dominikwilkowski/cfonts" style="color:var(--accent)">cfonts</a> &bull; Inspired by <a href="https://github.com/shinshin86/oh-my-logo" style="color:var(--accent)">oh-my-logo</a> &bull; A project by the <a href="https://github.com/agentic-builders-collective" style="color:var(--accent)">Agentic Builders Collective</a> in 🇸🇬 &bull; <a href="https://github.com/agentic-builders-collective/logo-generator" style="color:var(--accent)">GitHub</a></p>
    </footer>
  </div>

  <script src="fonts.js"></script>
  <script src="app.js"></script>
</body>
</html>
